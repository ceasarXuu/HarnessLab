name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  required:
    name: required
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: clippy,rustfmt
      - uses: dtolnay/rust-toolchain@nightly-2026-05-26
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo tools
        run: |
          cargo install cargo-nextest --version 0.9.136 --locked
          cargo install cargo-llvm-cov --version 0.8.7 --locked
      - name: Run local gate
        run: scripts/test-after-change.sh
      - name: Upload traceability artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traceability
          path: artifacts/
          retention-days: 90
      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 90
