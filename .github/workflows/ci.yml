name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  # Auto CI disabled per user request; only manual dispatch remains.
  # pull_request:
  # push:
  #   branches: [main]
  workflow_dispatch:
    inputs:
      real_harbor_smoke:
        description: Run opt-in real Harbor Docker smoke tests
        required: false
        default: false
        type: boolean

jobs:
  python-web:
    name: Python Web Gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python dependencies
        run: uv sync --group dev
      - name: Ruff
        run: uv run ruff check ornnlab tests/python
      - name: Pyright
        run: uv run pyright
      - name: Pytest
        run: uv run pytest tests/python
      - name: OrnnLab rebrand guard
        run: uv run python scripts/verify-ornnlab-rebrand.py
      - name: Python line-count gate
        run: uv run python scripts/check-python-file-length.py ornnlab
      - name: Diff whitespace check
        run: git diff --check

  frontend-web:
    name: Frontend Web Gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Install backend dependencies for launcher smoke
        run: uv sync --group dev
      - name: Typecheck
        run: npm run typecheck
        working-directory: frontend
      - name: Lint
        run: npm run lint
        working-directory: frontend
      - name: Unit tests
        run: npm run test
        working-directory: frontend
      - name: Production build
        run: npm run build
        working-directory: frontend
      - name: WebUI bundle budget
        run: npm run check:webui-bundle
      - name: Reject mock production build
        run: node scripts/test-webui-build-config.js
      - name: Cross-platform launcher API smoke
        run: npm run test:launcher
      - name: Storybook smoke
        run: npm run storybook:test
        working-directory: frontend
      - name: Storybook static build
        run: npm run storybook:build
        working-directory: frontend

  real-harbor-docker-smoke:
    name: Real Harbor Docker Smoke
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.real_harbor_smoke }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python dependencies
        run: uv sync --group dev
      - name: Run real Harbor Docker smoke
        env:
          ORNNLAB_REAL_HARBOR: "1"
        run: |
          uv run pytest -m docker \
            tests/python/test_harbor_real_smoke.py \
            tests/python/test_real_harbor_cancel_recovery.py
