name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  # Auto CI disabled per user request; only manual dispatch remains.
  # pull_request:
  # push:
  #   branches: [main]
  workflow_dispatch:
    inputs:
      real_harbor_smoke:
        description: Run opt-in real Harbor Docker smoke tests
        required: false
        default: false
        type: boolean

jobs:
  python-web:
    name: Python Web Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python dependencies
        run: uv sync --group dev
      - name: Ruff
        run: uv run ruff check ornnlab tests/python
      - name: Pyright
        run: uv run pyright
      - name: Pytest
        run: uv run pytest tests/python
      - name: OrnnLab rebrand guard
        run: uv run python scripts/verify-ornnlab-rebrand.py
      - name: Python line-count gate
        run: |
          uv run python - <<'PY'
          from pathlib import Path

          violations = []
          for path in Path("ornnlab").rglob("*.py"):
              line_count = len(path.read_text(encoding="utf-8").splitlines())
              if line_count > 500:
                  violations.append(f"{path}:{line_count}")
          if violations:
              raise SystemExit("Files exceed 500 lines:\n" + "\n".join(violations))
          PY
      - name: Diff whitespace check
        run: git diff --check

  real-harbor-docker-smoke:
    name: Real Harbor Docker Smoke
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.real_harbor_smoke }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python dependencies
        run: uv sync --group dev
      - name: Run real Harbor Docker smoke
        env:
          ORNNLAB_REAL_HARBOR: "1"
        run: |
          uv run pytest -m docker \
            tests/python/test_harbor_real_smoke.py \
            tests/python/test_real_harbor_cancel_recovery.py
